name: Android CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [free, pro]
        buildType: [debug, release]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: gradle-${{ runner.os }}-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode keystore
      if: matrix.buildType == 'release'
      run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release-keystore.jks

    - name: Generate key.properties
      if: matrix.buildType == 'release'
      run: |
        cat > app/key.properties <<EOF
        storePassword=${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword=${{ secrets.KEY_PASSWORD }}
        keyAlias=${{ secrets.KEY_ALIAS }}
        storeFile=release-keystore.jks
        EOF

    - name: Build ${{ matrix.flavor }} ${{ matrix.buildType }} APK
      run: ./gradlew assemble${{ matrix.flavor == 'free' && 'Free' || 'Pro' }}${{ matrix.buildType == 'debug' && 'Debug' || 'Release' }}

    - name: Upload APK
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.flavor }}-${{ matrix.buildType }}-apk
        path: app/build/outputs/apk/${{ matrix.flavor }}/${{ matrix.buildType }}/*.apk

    - name: Clean up secrets
      if: always()
      run: rm -f app/release-keystore.jks app/key.properties

  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Run lint
      run: ./gradlew lint || true
      continue-on-error: true

    - name: Upload lint report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: lint-report
        path: app/build/reports/lint-results-*.html
