name: Deploy to Play Store

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., 1.1.0)'
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode keystore
      run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release-keystore.jks

    - name: Generate key.properties
      run: |
        cat > app/key.properties <<EOF
        storePassword=${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword=${{ secrets.KEY_PASSWORD }}
        keyAlias=${{ secrets.KEY_ALIAS }}
        storeFile=release-keystore.jks
        EOF

    - name: Build Pro Release APK
      run: ./gradlew assembleProRelease

    - name: Build Free Release APK
      run: ./gradlew assembleFreeRelease

    - name: Upload to Play Store (Internal Track)
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON_KEY }}
        packageName: com.mimo.mobile.pro
        releaseFiles: app/build/outputs/apk/pro/release/app-pro-release.apk
        track: internal

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-apks
        path: |
          app/build/outputs/apk/pro/release/*.apk
          app/build/outputs/apk/free/release/*.apk

    - name: Clean up
      if: always()
      run: rm -f app/release-keystore.jks app/key.properties
